name: Data Platform Infrastructure CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]

jobs:
  continuous-integration:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Python Environment
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Run Test Suite
        run: |
          pip install -r shared-libs/requirements.txt
          export PYTHONPATH=$PYTHONPATH:$(pwd)/shared-libs
          pytest tests/

      - name: Configure AWS Administrative Credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-southeast-1

      - name: Run Package & Deployment Script
        run: |
          chmod +x scripts/build_and_deploy.sh
          ./scripts/build_and_deploy.sh dev

      - name: Initialize and Validate Infrastructure State
        run: |
          cd infrastructure
          terraform init
          terraform validate
          terraform plan -var-file="environments/dev.tfvars"